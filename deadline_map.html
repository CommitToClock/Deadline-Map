<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lernplan & Kapazitäts-Check</title>
  <style>
    :root {
      --bg: #f8fafc;           /* Sehr helles, modernes Grau-Blau für den Hintergrund */
      --card: #ffffff;         /* Reines Weiß für die Boxen und Kalendertage */
      --text: #0f172a;         /* Dunkles Schiefergrau für perfekte Lesbarkeit */
      --text-muted: #64748b;
      --accent: #2563eb;       /* Ein edles, klares Blau für primäre Buttons/Elemente */
      --today-bg: #fef08a;     /* Ein sanftes Pastellgelb für den heutigen Tag */
      --border: #e2e8f0;
      --focus: #3b82f6;
      --shadow-sm: 0 1px 2px rgb(15 23 42 / 0.08);

      --heat-none: #ffffff;    /* Keine Auslastung (Weiß) */
      --heat-low: #ecfdf5;     /* Niedrige Auslastung (Sehr softes Pastellgrün) */
      --heat-medium: #fef3c7;  /* Mittlere Auslastung (Softes Pastellgelb) */
      --heat-high: #ffedd5;    /* Hohe Auslastung (Softes Pastellorange) */
      --heat-over: #fef2f2;    /* Überlastet / Ausnahme (Softes Pastellrot) */
    }
    body{font-family:Inter,Segoe UI,Arial,Helvetica,sans-serif;margin:2rem auto;max-width:1400px;padding:0 1.5rem;background:var(--bg);color:var(--text)}
    h1{font-size:2rem;font-weight:800;margin-bottom:1.5rem;letter-spacing:-0.03em;}
    #month-title{font-size:1.05rem;font-weight:700;color:var(--text);}
    section.card-panel{background:var(--card);border:1px solid var(--border);border-radius:1rem;box-shadow:var(--shadow-sm);padding:1.5rem;margin-bottom:1.25rem}
    #month-calendar{display:grid;grid-template-columns:60px repeat(7,1fr);gap:8px}
    .weekday-label{font-weight:700;text-align:center;color:var(--text-muted);padding:0.6rem 0;letter-spacing:0.1em;text-transform:uppercase;background:var(--card);border-radius:1rem;box-shadow:var(--shadow-sm)}
    .week-number{font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--text-muted);background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:0.7rem;box-shadow:var(--shadow-sm)}
    .day.empty{background:transparent;border:none}
    .day-cell{background:var(--card);padding:10px;border-radius:14px;border:1px solid var(--border);min-height:94px;display:flex;flex-direction:column;gap:6px}
    .day-cell.today{outline:2px solid #f59e0b;outline-offset:-2px;}
    .day-number{font-weight:700;font-size:0.95rem;color:var(--text)}
    .today{background:#fef3c7;border:1px solid #f59e0b}
    .capacity-bar{height:7px;background:var(--heat-none);border-radius:6px;margin-top:4px;overflow:hidden}
    .capacity-fill{height:100%;width:0%;transition:width .3s ease}
    .day-cell.overloaded{background:#fee2e2;color:#991b1b;border-color:#fecaca}
    .day-cell.free-time{background:#ecfdf5;color:#166534;border-color:#bbf7d0}
    .day-cell.partial-time{background:#eff6ff;color:#1e3a8a;border-color:#93c5fd}
    .day-cell.exception-day{background:#e2e8f0;color:#1e3a8a;border:1px solid #93c5fd}
    .day-cell.exception-day .day-number{color:#1e3a8a}
    .day-cell.exception-day .exception-label{margin-top:6px;padding:4px 8px;border-radius:999px;background:#dbeafe;color:#1e3a8a;font-size:0.8rem;font-weight:700;display:inline-block}
    .task-block{margin-top:6px;padding:12px 16px;border-radius:20px;font-size:0.95rem;display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--border);min-height:52px}
    .day-cell .task-block{padding:6px 8px;border-radius:14px;font-size:0.8rem;min-height:auto;gap:6px;background:rgba(255,255,255,0.95);border-color:rgba(59,130,246,0.2);}
    .day-cell .task-block .task-title{font-size:0.85rem}
    .day-cell .task-block span:last-child{font-size:0.75rem;white-space:nowrap;}
    .day-cell .deadline-banner{font-size:0.74rem;padding:6px 8px;}
    .task-priority-pill{display:inline-flex;align-items:center;justify-content:center;min-width:26px;padding:0 7px;height:22px;border-radius:999px;font-size:0.72rem;font-weight:700;letter-spacing:0.01em;}
    .day-cell .task-block.priority-1{background:#dbeafe;border-color:#93c5fd;color:#1d4ed8;}
    .day-cell .task-block.priority-1 .task-priority-pill{background:#eff6ff;color:#1d4ed8;}
    .day-cell .task-block.priority-2{background:#bfdbfe;border-color:#60a5fa;color:#1e40af;}
    .day-cell .task-block.priority-2 .task-priority-pill{background:#93c5fd;color:#1d4ed8;}
    .day-cell .task-block.priority-3{background:#1d4ed8;border-color:#1e40af;color:#fff;}
    .day-cell .task-block.priority-3 .task-priority-pill{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.3);}
    .day-cell .task-block.priority-3 .task-title{color:#fff}
    .day-cell .task-block.priority-1 .task-title, .day-cell .task-block.priority-2 .task-title{color:#1d4ed8}
    .task-title{font-weight:600;flex:1}
    .deadline-banner{margin-top:8px;padding:10px;border-radius:12px;background:var(--accent);color:#fff;font-weight:700;border:1px solid var(--accent);}
    .task-progress{margin-top:10px;display:flex;flex-direction:column;gap:4px;font-size:0.85rem;color:var(--text)}
    .progress-bar{height:10px;background:var(--border);border-radius:999px;overflow:hidden}
    .progress-fill{height:100%;width:0%;transition:width .3s ease}
    .progress-fill.low{background:linear-gradient(90deg,#dc2626,#f87171)}
    .progress-fill.medium{background:linear-gradient(90deg,#f59e0b,#fb923c)}
    .progress-fill.full{background:linear-gradient(90deg,#22c55e,#4ade80)}
    .capacity-fill.low{background:linear-gradient(90deg,#4ade80,#86efac)}
    .capacity-fill.medium{background:linear-gradient(90deg,#f59e0b,#fb923c)}
    .capacity-fill.full{background:linear-gradient(90deg,#ef4444,#f87171)}
    .priority-1{background:#eff6ff;color:#1d4ed8}
    .priority-2{background:#dbeafe;color:#1d4ed8}
    .priority-3{background:#93c5fd;color:#1e3a8a;font-weight:700}
    .priority-selector{display:flex;gap:0.4rem;}
    .priority-selector button{flex:1;min-width:0;border:none;background:#f8fafc;color:#475569;border:1px solid #e2e8f0;border-radius:0.85rem;font-weight:700;padding:0.7rem 0.6rem;cursor:pointer;transition:background .2s ease,border-color .2s ease,color .2s ease}
    .priority-selector button.active{background:#2563eb;color:#fff;border-color:#2563eb;box-shadow:0 10px 20px rgba(37,99,235,0.18)}
    .priority-selector button:hover{background:#e2e8f0}
    .status-pill{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:0.75rem;font-weight:700;letter-spacing:.02em}
    .status-assigned{background:#dbf4ff;color:#0369a1}
    .status-overdue{background:#fee2e2;color:#b91c1c}
    .status-unassigned{background:#f8fafc;color:#475569}
    .toolbar{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:16px}
    .toolbar .toggle-btn{background:var(--accent);color:#fff;border:none}
    .month-nav{padding:1rem 1.25rem;background:rgba(255,255,255,0.9);border:1px solid var(--border);border-radius:1rem;box-shadow:var(--shadow-sm);justify-content:center}
    .month-nav button{min-width:45px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;min-height:44px;padding:0.75rem 1.25rem;border-radius:0.75rem;border:1px solid transparent;background:#2563eb;color:#fff;font-weight:600;transition:background .2s ease,color .2s ease}
    .btn:hover{background:#1d4ed8}
    .btn-icon{display:inline-flex;align-items:center;justify-content:center;width:1.25rem;height:1.25rem;font-size:1rem}
    .btn-danger{background:transparent;color:#ef4444;border:none;font-weight:600;border-radius:0.5rem;padding:0.5rem 0.75rem;transition:background .2s ease}
    .btn-danger:hover{background:#fef2f2}
    input[type="number"], input[type="date"], input[type="text"], select{background:#f8fafc;border:1px solid #e2e8f0;border-radius:0.75rem;padding:0.75rem 1rem;color:var(--text);box-shadow:inset 0 1px 2px rgb(15 23 42 / 0.06);box-sizing:border-box;min-width:0;}
    input[type="number"], input[type="date"], input[type="text"], select{transition:border-color .2s ease,box-shadow .2s ease}
    input:focus, select:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,0.15)}
    .legend{display:flex;flex-wrap:wrap;gap:0.75rem;margin-top:1rem;font-size:0.95rem;color:var(--text-muted)}
    .legend-item{display:flex;align-items:center;gap:0.5rem;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:0.55rem 0.85rem;box-shadow:var(--shadow-sm)}
    .legend-dot{width:0.75rem;height:0.75rem;border-radius:999px;display:inline-block}
    .task-row, .slot-row, .exception-row{
      display:grid;
      gap:0.75rem;
      align-items:center;
      margin-bottom:10px;
      padding:14px;
      background:var(--card);
      border:1px solid var(--border);
      border-radius:14px;
      box-shadow:0 1px 2px rgb(15 23 42 / 0.05);
    }
    .task-row.priority-1{background:rgba(219,234,254,0.18);border-color:#bfdbfe;}
    .task-row.priority-2{background:rgba(191,219,254,0.22);border-color:#93c5fd;}
    .task-row.priority-3{background:rgba(59,130,246,0.18);border-color:#1d4ed8;}
    .task-row.priority-3 .field-group label,
    .task-row.priority-3 .field-group input,
    .task-row.priority-3 .field-group select{color:#1e3a8a;}
    .task-row{grid-template-columns:2.6fr 0.85fr 1.2fr 0.9fr auto;}
    .slot-row{grid-template-columns:1.2fr 1fr auto;}
    .exception-row{grid-template-columns:1.3fr 1fr 1fr auto;}
    .field-group{display:flex;flex-direction:column;gap:0.35rem;min-width:0;}
    .field-group input, .field-group select{width:100%;min-width:0;}
    .task-row input[type="date"]{min-width:0;}
    .priority-selector{gap:0.25rem;}
    .field-group label{font-size:0.85rem;color:var(--text-muted);}
    .task-row button, .slot-row button, .exception-row button{align-self:center;}
    .dark body{background:#0f172a;color:#f8fafc}
    .dark .day-cell{background:#1e293b;border-color:#334155}
    .dark .weekday-label,.dark .week-number{color:#cbd5e1;background:#334155}
    .dark .status-pill.status-assigned{background:#0f172a;color:#7dd3fc}
    .dark .status-pill.status-overdue{background:#331a1a;color:#fecaca}
    .dark .status-pill.status-unassigned{background:#1e293b;color:#cbd5e1}
    .dark input, .dark select{background:#0f172a;color:#f8fafc;border-color:#334155}
    .dark .task-block{background:#111827}

    @media (max-width: 900px) {
      body{margin:1.25rem auto;padding:0 1rem;}
      section.card-panel{padding:1rem;}
      .toolbar{justify-content:center;gap:10px;}
      .month-nav{flex-direction:column;gap:0.75rem;padding:0.85rem 1rem;}
      .month-nav button{min-width:40px;}
      .btn{width:100%;min-width:0;}
      .task-row, .slot-row, .exception-row{flex-direction:column;align-items:stretch;}
      .task-row input, .task-row select, .slot-row input, .slot-row select, .exception-row input, .exception-row select{width:100%;}
      .legend{flex-direction:column;align-items:flex-start;}
      #month-calendar{grid-template-columns:40px repeat(7, minmax(0,1fr));gap:10px;}
      .weekday-label{padding:0.6rem 0;}
      .week-number{padding:0.7rem;}
      .day-cell{min-height:100px;}
      .task-block{flex-direction:column;align-items:flex-start;}
    }

    @media (max-width: 600px) {
      body{margin:1rem auto;padding:0 0.75rem;}
      section.card-panel{padding:1rem;}
      .toolbar, .month-nav{flex-direction:column;align-items:stretch;}
      .month-nav{gap:0.75rem;padding:0.85rem 1rem;}
      .month-nav strong{display:block;margin:0.5rem 0;}
      .btn{width:100%;}
      .month-nav button{min-width:0;}
      #month-calendar{grid-template-columns:32px repeat(7, minmax(0,1fr));gap:6px;}
      .weekday-label{font-size:0.72rem;padding:0.5rem 0;}
      .week-number{padding:0.55rem;font-size:0.78rem;}
      .day-cell{padding:10px;border-radius:12px;min-height:90px;}
      .day-number{font-size:0.9rem;}
      .legend{gap:0.5rem;font-size:0.85rem;}
      .legend-item{padding:0.45rem 0.75rem;}
      .task-block{padding:10px 12px;}
      .task-row, .slot-row, .exception-row{padding:10px;}
      .toolbar > .btn{width:100%;}
    }
  </style>
</head>
<body>
  <h1>Lernplan & Kapazitäts-Check</h1>
  <div class="toolbar">
    <button id="save-data" class="btn"><span class="btn-icon">💾</span>Speichern</button>
    <button id="load-data" class="btn"><span class="btn-icon">📂</span>Laden</button>
    <button id="export-data" class="btn"><span class="btn-icon">⬇️</span>Exportieren</button>
    <button id="import-data" class="btn"><span class="btn-icon">⬆️</span>Importieren</button>
    <button id="toggle-dark" class="btn toggle-btn"><span class="btn-icon">🌙</span>Dark Mode</button>
    <input id="file-import" type="file" accept="application/json" style="display:none">
  </div>
  <section class="card-panel">
    <div class="toolbar month-nav">
      <button id="prev-month" class="btn">«</button>
      <strong id="month-title"></strong>
      <button id="next-month" class="btn">»</button>
    </div>
    <div id="month-calendar"></div>
  </section>

  <div style="display:flex;gap:16px;flex-wrap:wrap;">
    <section class="card-panel" style="flex:1.1;min-width:300px;">
      <h3>Aufgaben</h3>
      <div id="tasks"></div>
      <button id="add-task" class="btn">Aufgabe hinzufügen</button>
    </section>
    <section class="card-panel" style="flex:0.8;min-width:240px;max-width:280px;">
      <h3>Slots</h3>
      <div id="slots"></div>
      <button id="add-slot" class="btn">Slot hinzufügen</button>
    </section>
    <section class="card-panel" style="flex:1 1 100%;min-width:300px;max-width:none;">
      <h3>Ausnahmen</h3>
      <div id="exceptions"></div>
      <button id="add-exception" class="btn">Ausnahme hinzufügen</button>
    </section>
  </div>

  <script>
    // helpers
    const toLocalISO = d => new Date(d).toLocaleDateString('sv-SE');
    const formatDateDE = ds => ds ? ds.split('-').reverse().join('.') : '';
    function getWeekNumber(d) {
      d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return [d.getUTCFullYear(), weekNo];
    }
    function isException(dateStr) {
      return (window.exceptions || []).some(e => dateStr >= e.from && dateStr <= e.to);
    }

    // small utilities
    function buildSlotMap(slots){ const m={}; (slots||[]).forEach(s=>m[s.day]=Math.round((Number(s.hours)||0)*60)); return m; }

    // scheduling algorithm (kept simple)
    function schedule(tasks, slots, exceptions){
      if(!tasks||tasks.length===0) return [];
      const plan=[];
      const dayNames=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
      const slotMap = buildSlotMap(slots);
      const today = new Date(); today.setHours(0,0,0,0);
      const maxDL = new Date(Math.max(...tasks.map(t=>new Date(t.deadline))));
      const calendar = [];
      for(let d=new Date(today); d<=maxDL; d.setDate(d.getDate()+1)){
        const ds = toLocalISO(d);
        const capacity = isException(ds) ? 0 : (slotMap[new Date(d).toLocaleDateString('de-DE',{weekday:'long'})]||0);
        if(capacity>0) calendar.push({date:ds,remaining:capacity,day:dayNames[new Date(d).getDay()]});
      }
      const sorted = [...tasks].sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
      sorted.forEach(task=>{
        let need = Number(task.minutes||task.hours||0);
        if (!task.minutes && task.hours) need = Number(task.hours)*60;
        if (!need) return;
        for(const day of calendar){ if(need<=0) break; if(day.remaining<=0) continue; if(new Date(day.date) >= new Date(task.deadline)) continue; const alloc = Math.min(need, day.remaining); plan.push({date:day.date,title:task.title,minutes:alloc,status:'assigned',importance:task.importance}); day.remaining-=alloc; need-=alloc; }
        if(need>0) plan.push({title:task.title,minutes:need,status:'overdue',importance:task.importance});
      });
      return plan;
    }

    // UI helpers
    function createRow(containerId, html){ const div=document.createElement('div'); div.className = containerId.slice(0,-1)+'-row'; div.innerHTML = html + `<button class="btn btn-danger" onclick="this.parentElement.remove()">✕</button>`; document.getElementById(containerId).appendChild(div); if(containerId==='tasks'){ const prio = div.querySelector('.t-imp')?.value || '1'; div.classList.add(`priority-${prio}`); }}
    document.addEventListener('click', e => {
      const btn = e.target.closest('.priority-selector button');
      if (!btn) return;
      e.preventDefault();
      const picker = btn.closest('.priority-selector');
      const row = btn.closest('.task-row');
      if (!picker || !row) return;
      picker.querySelectorAll('button').forEach(b=>b.classList.toggle('active', b===btn));
      const input = row.querySelector('.t-imp');
      if (input) input.value = btn.dataset.priority;
      row.classList.remove('priority-1','priority-2','priority-3');
      row.classList.add(`priority-${btn.dataset.priority}`);
    });
    function getTasksFromUI(){ return [...document.querySelectorAll('.task-row')].map(r=>({ title: r.querySelector('.t-title').value, minutes: parseFloat(r.querySelector('.t-hrs').value||0)*60, deadline: r.querySelector('.t-dl').value, importance: r.querySelector('.t-imp').value })).filter(t=>t.title && t.deadline); }
    function getSlotsFromUI(){ return [...document.querySelectorAll('.slot-row')].map(r=>({ day: r.querySelector('.s-day').value, hours: parseFloat(r.querySelector('.s-hrs').value||0) })).filter(s=>s.hours>0); }
    function getExceptionsFromUI(){ return [...document.querySelectorAll('.exception-row')].map(r=>({ name: r.querySelector('.e-name').value, from: r.querySelector('.e-from').value, to: r.querySelector('.e-to').value })).filter(e=>e.from && e.to); }

    function getFormData(){ return { tasks: getTasksFromUI(), slots: getSlotsFromUI(), exceptions: getExceptionsFromUI(), month: currentMonthDate.toISOString().slice(0,7) }; }
    function fillFormData(data){
      document.getElementById('tasks').innerHTML='';
      document.getElementById('slots').innerHTML='';
      document.getElementById('exceptions').innerHTML='';
      (data.tasks||[]).forEach(t=> {
        const prio = Math.min(3, Math.max(1, Number(t.importance||1)));
        createRow('tasks', `<div class="field-group"><label>Aufgabe</label><input class="t-title" value="${t.title}"></div><div class="field-group"><label>Stunden</label><input class="t-hrs" type="number" value="${(t.minutes||0)/60}"></div><div class="field-group"><label>Deadline</label><input class=\"t-dl\" type=\"date\" value=\"${t.deadline}\"></div><div class="field-group"><label>Prio</label><div class="priority-selector"><button type=\"button\" class=\"prio-btn${prio===1?' active':''}\" data-priority=\"1\">!</button><button type=\"button\" class=\"prio-btn${prio===2?' active':''}\" data-priority=\"2\">!!</button><button type=\"button\" class=\"prio-btn${prio===3?' active':''}\" data-priority=\"3\">!!!</button></div><input class=\"t-imp\" type=\"hidden\" value=\"${prio}\"></div>`);
      });
      (data.slots||[]).forEach(s=> {
        createRow('slots', `<div class="field-group"><label>Tag</label><select class="s-day"><option>Montag</option><option>Dienstag</option><option>Mittwoch</option><option>Donnerstag</option><option>Freitag</option><option>Samstag</option><option>Sonntag</option></select></div><div class="field-group"><label>Stunden/Tag</label><input class="s-hrs" type="number" value="${s.hours||0}"></div>`);
        const rows = document.querySelectorAll('.slot-row');
        const latest = rows[rows.length-1];
        if(latest) latest.querySelector('.s-day').value = s.day;
      });
      (data.exceptions||[]).forEach(e=> createRow('exceptions', `<div class="field-group"><label>Grund</label><input class="e-name" value="${e.name}"></div><div class="field-group"><label>Von</label><input class="e-from" type="date" value="${e.from}"></div><div class="field-group"><label>Bis</label><input class="e-to" type="date" value="${e.to}"></div>`));
      if(data.month){ const [year,month]=data.month.split('-'); currentMonthDate = new Date(Number(year), Number(month)-1,1); }
    }
    function saveData(){ localStorage.setItem('lernplan_saved_data', JSON.stringify(getFormData())); alert('Daten gespeichert.'); }
    function loadData(){ const saved = localStorage.getItem('lernplan_saved_data'); if(!saved){ alert('Keine gespeicherten Daten gefunden.'); return;} fillFormData(JSON.parse(saved)); renderMonthView(); alert('Daten geladen.'); }
    function exportData(){ const blob = new Blob([JSON.stringify(getFormData(), null, 2)], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'lernplan_export.json'; a.click(); URL.revokeObjectURL(url); }
    function importData(file){ const reader = new FileReader(); reader.onload = () => { try{ fillFormData(JSON.parse(reader.result)); renderMonthView(); alert('Import erfolgreich.'); } catch(e){ alert('Import fehlgeschlagen: ungültige JSON-Datei.'); }}; reader.readAsText(file); }
    function setDarkMode(enabled){ document.documentElement.classList.toggle('dark', enabled); localStorage.setItem('lernplan_dark_mode', enabled ? '1' : '0'); document.getElementById('toggle-dark').textContent = enabled ? 'Light Mode' : 'Dark Mode'; }
    function initDarkMode(){ setDarkMode(localStorage.getItem('lernplan_dark_mode') === '1'); }

    let currentMonthDate = new Date(); currentMonthDate.setDate(1);

    function renderMonthView(){
      const tasks = getTasksFromUI();
      const slots = getSlotsFromUI();
      const exceptions = getExceptionsFromUI();
      window.slotMap = buildSlotMap(slots);
      window.exceptions = exceptions;
      const results = schedule(tasks, slots, exceptions);
      window.plan = results; window.tasks = tasks;

      const assignedMinutes = tasks.map(() => 0);
      results.filter(r => r.status === 'assigned').forEach(result => {
        const idx = tasks.findIndex(task => task.title === result.title && new Date(result.date) <= new Date(task.deadline));
        if (idx >= 0) assignedMinutes[idx] += result.minutes;
      });
      document.querySelectorAll('.task-row').forEach((row, i) => {
        const task = tasks[i];
        if (!task) return;
        let progress = row.querySelector('.task-progress');
        if (!progress) {
          progress = document.createElement('div');
          progress.className = 'task-progress';
          row.appendChild(progress);
        }
        const planned = assignedMinutes[i] || 0;
        const total = task.minutes || 0;
        const pct = total > 0 ? Math.min(100, Math.round((planned / total) * 100)) : 0;
        const ratio = total > 0 ? planned / total : 0;
        const fillClass = ratio >= 1 ? 'full' : ratio >= 0.5 ? 'medium' : 'low';
        progress.innerHTML = `<div>${(planned/60).toFixed(1)}h von ${(total/60).toFixed(1)}h geplant</div><div class="progress-bar"><div class="progress-fill ${fillClass}" style="width:${pct}%"></div></div>`;
      });

      const month = new Date(currentMonthDate);
      const daysInMonth = new Date(month.getFullYear(), month.getMonth()+1, 0).getDate();
      const firstDayRaw = new Date(month.getFullYear(), month.getMonth(), 1).getDay();
      const firstDay = (firstDayRaw + 6) % 7;

      const dayPlans = {};
      results.forEach(r=>{ if(r.status==='assigned'){ (dayPlans[r.date] = dayPlans[r.date]||[]).push(r); } });
      const deadlineTasks = {};
      tasks.forEach(t=>{ (deadlineTasks[t.deadline]=deadlineTasks[t.deadline]||[]).push(t); });

      document.getElementById('month-title').textContent = month.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
      const container = document.getElementById('month-calendar'); container.innerHTML = '';
      const headerBlank = document.createElement('div'); headerBlank.className = 'week-number'; container.appendChild(headerBlank);
      ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>{ const cell=document.createElement('div'); cell.className='weekday-label'; cell.textContent=d; container.appendChild(cell); });
      const todayStr = toLocalISO(new Date());
      const totalCells = firstDay + daysInMonth;
      const weeks = Math.ceil(totalCells / 7);
      let day = 1;
      for(let row=0; row<weeks; row++){
        const weekStart = new Date(month.getFullYear(), month.getMonth(), 1 - firstDay + row*7);
        const [weekYear, weekNo] = getWeekNumber(weekStart);
        const weekLabel = document.createElement('div'); weekLabel.className='week-number'; weekLabel.textContent = `KW ${('0'+weekNo).slice(-2)}`;
        container.appendChild(weekLabel);
        for(let weekday=0; weekday<7; weekday++){
          const dateIndex = row*7 + weekday - firstDay + 1;
          if(dateIndex < 1 || dateIndex > daysInMonth){ const empty=document.createElement('div'); empty.className='day empty'; container.appendChild(empty); continue; }
          const dateStr = toLocalISO(new Date(month.getFullYear(), month.getMonth(), dateIndex));
          const dayCell = document.createElement('div'); dayCell.className='day-cell'; dayCell.dataset.date = dateStr; if(dateStr===todayStr) dayCell.classList.add('today');
          const header = document.createElement('div'); header.className='day-number'; header.textContent = dateIndex; dayCell.appendChild(header);
          const tasksForDay = dayPlans[dateStr]||[];
          const deadlineForDay = deadlineTasks[dateStr]||[];
          const capacity = (window.slotMap && window.slotMap[new Date(dateStr).toLocaleDateString('de-DE',{weekday:'long'})]) || 0;
          const used = tasksForDay.reduce((sum,t)=>sum + (t.minutes||0), 0);
          const util = capacity > 0 ? used / capacity : 0;
          const exception = exceptions.find(e => dateStr >= e.from && dateStr <= e.to);
          if(exception){ dayCell.classList.add('exception-day'); const label=document.createElement('div'); label.className='exception-label'; label.textContent = exception.name || 'Ausnahme'; dayCell.appendChild(label); }
          if(capacity>0){ if(util < 0.5){ dayCell.classList.add('free-time'); } else { dayCell.classList.add('partial-time'); } const capInfo=document.createElement('div'); capInfo.style.fontSize='0.85rem'; capInfo.style.margin='0.25rem 0'; capInfo.textContent = `${(used/60).toFixed(1)}h / ${(capacity/60).toFixed(1)}h verplant`; dayCell.appendChild(capInfo); const bar=document.createElement('div'); bar.className='capacity-bar'; const usedFill=document.createElement('div'); const ratioClass = util >= 1 ? 'full' : util >= 0.5 ? 'medium' : 'low'; usedFill.className = `capacity-fill ${ratioClass}`; usedFill.style.width = `${Math.min(100, Math.round(util * 100))}%`; bar.appendChild(usedFill); dayCell.appendChild(bar); if(util >= 1){ dayCell.classList.add('overloaded'); } }
          if(capacity===0 && tasksForDay.length>0 && !exception){ dayCell.classList.add('overloaded'); const noSlot=document.createElement('div'); noSlot.style.fontSize='0.85rem'; noSlot.style.color='#b91c1c'; noSlot.textContent='Kein verfügbarer Slot'; dayCell.appendChild(noSlot); }
          tasksForDay.slice(0,2).forEach(t=>{ const tb=document.createElement('div'); const prio = Math.min(3, Math.max(1, parseInt(t.importance)||1)); tb.className=`task-block priority-${prio}`; tb.draggable=true; tb.dataset.title=t.title; const badge = '!'.repeat(prio); tb.innerHTML = `<span class="task-priority-pill">${badge}</span><span class="task-title">${t.title}</span><span>${(t.minutes/60).toFixed(1)}h</span>`; dayCell.appendChild(tb); });
          deadlineForDay.forEach(t=>{ const dl=document.createElement('div'); dl.className='deadline-banner'; dl.textContent = `Deadline: ${t.title}`; dayCell.appendChild(dl); });
          if(tasksForDay.length>2){ const more=document.createElement('div'); more.style.fontSize='0.75rem'; more.style.marginTop='6px'; more.textContent = `+${tasksForDay.length-2} mehr`; dayCell.appendChild(more); }
          container.appendChild(dayCell);
        }
      }

    }

    function changeMonth(offset){ currentMonthDate.setMonth(currentMonthDate.getMonth()+offset); renderMonthView(); }

    // wire controls
    document.getElementById('prev-month').addEventListener('click', ()=>changeMonth(-1));
    document.getElementById('next-month').addEventListener('click', ()=>changeMonth(1));
    document.getElementById('save-data').addEventListener('click', saveData);
    document.getElementById('load-data').addEventListener('click', loadData);
    document.getElementById('export-data').addEventListener('click', exportData);
    document.getElementById('import-data').addEventListener('click', ()=> document.getElementById('file-import').click());
    document.getElementById('file-import').addEventListener('change', e=>{ const file = e.target.files[0]; if(file) importData(file); e.target.value=''; });
    document.getElementById('toggle-dark').addEventListener('click', ()=> setDarkMode(!document.documentElement.classList.contains('dark')));

    document.getElementById('add-task').addEventListener('click', ()=> createRow('tasks', `
      <div class="field-group"><label>Aufgabe</label><input class="t-title" placeholder="Aufgabe"></div>
      <div class="field-group"><label>Stunden</label><input class="t-hrs" type="number" step="0.25" value="0"></div>
      <div class="field-group"><label>Deadline</label><input class="t-dl" type="date"></div>
      <div class="field-group"><label>Prio</label><div class="priority-selector"><button type="button" class="prio-btn active" data-priority="1">!</button><button type="button" class="prio-btn" data-priority="2">!!</button><button type="button" class="prio-btn" data-priority="3">!!!</button></div><input class="t-imp" type="hidden" value="1"></div>
    `));

    document.getElementById('add-slot').addEventListener('click', ()=> createRow('slots', `
      <div class="field-group"><label>Tag</label><select class="s-day">
        <option>Montag</option><option>Dienstag</option><option>Mittwoch</option><option>Donnerstag</option><option>Freitag</option><option>Samstag</option><option>Sonntag</option>
      </select></div>
      <div class="field-group"><label>Stunden/Tag</label><input class="s-hrs" type="number" step="0.25" value="0"></div>
    `));

    document.getElementById('add-exception').addEventListener('click', ()=> createRow('exceptions', `
      <div class="field-group"><label>Grund</label><input class="e-name" placeholder="Grund"></div>
      <div class="field-group"><label>Von</label><input class="e-from" type="date"></div>
      <div class="field-group"><label>Bis</label><input class="e-to" type="date"></div>
    `));

    document.addEventListener('input', renderMonthView);
    document.addEventListener('change', renderMonthView);
    window.addEventListener('DOMContentLoaded', ()=>{ initDarkMode(); renderMonthView(); });

    // simple auto-save
    function enableAutoSave(){ document.addEventListener('change', ()=>{
      localStorage.setItem('lernplan_autosave_tasks', JSON.stringify([...document.querySelectorAll('.task-row')].map(r=>({ title: r.querySelector('.t-title').value, hours: r.querySelector('.t-hrs').value, deadline: r.querySelector('.t-dl').value, importance: r.querySelector('.t-imp').value }))));
      localStorage.setItem('lernplan_autosave_slots', JSON.stringify([...document.querySelectorAll('.slot-row')].map(r=>({ day: r.querySelector('.s-day').value, hours: r.querySelector('.s-hrs').value }))));
      localStorage.setItem('lernplan_autosave_exceptions', JSON.stringify([...document.querySelectorAll('.exception-row')].map(r=>({ name: r.querySelector('.e-name').value, from: r.querySelector('.e-from').value, to: r.querySelector('.e-to').value }))));
    }); }
    enableAutoSave();

    // drag/drop support
    function allowDrop(ev){ ev.preventDefault(); }
    function drag(ev){ ev.dataTransfer.setData('text', ev.target.dataset.title); }
    function drop(ev){ ev.preventDefault(); const title = ev.dataTransfer.getData('text'); const cell = ev.target.closest('.day-cell'); if(!cell) return; const targetDate = cell.dataset.date; const item = (window.plan||[]).find(p=>p.title===title && p.status==='assigned'); if(item){ if(new Date(targetDate) > new Date(item.deadline)){ alert(`Die Aufgabe "${item.title}" darf nicht nach ihrer Deadline (${formatDateDE(item.deadline)}) verschoben werden.`); return; } item.date = targetDate; renderMonthView(); }}
    document.addEventListener('dragstart', e=>{ if(e.target.classList.contains('task-block')) drag(e); });
    document.addEventListener('dragover', e=>{ if(e.target.closest('.day-cell')) allowDrop(e); });
    document.addEventListener('drop', e=>{ if(e.target.closest('.day-cell')) drop(e); });
  </script>
</body>
</html>
