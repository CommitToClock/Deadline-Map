<!DOCTYPE html>
<html lang="de">
<head>
  <script type="module" src="/@vite/client"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lernplan & KapazitÃ¤ts-Check</title>
  <style>
    :root {
      --bg-color: #f5f8ff;
      --card-bg: #fff;
      --text-color: #1f3b7c;
      --border-color: #ddd;
      --shadow: rgba(0,0,0,0.1);
    }
    .dark {
      --bg-color: #1a1a1a;
      --card-bg: #2a2a2a;
      --text-color: #e0e0e0;
      --border-color: #444;
      --shadow: rgba(0,0,0,0.3);
    }
    body { font-family: Arial, sans-serif; margin: 1.5rem; background: var(--bg-color); color: var(--text-color); transition: background 0.3s, color 0.3s; }
    h1, h2, h3, h4 { color: var(--text-color); }
    .warn { color: #b22222; font-weight: bold; }
    .ok { color: #2a7f2a; }
    .task-row, .slot-row, .exception-row { 
      margin-bottom: 0.5rem; 
      padding: 10px; 
      background: var(--card-bg); 
      border-radius: 12px; 
    }
  </style>
  <script>

    function loadFromLocalStorage() {
      const tasks = JSON.parse(localStorage.getItem('lernplan_tasks') || '[]');
      function formatHours(minutes) {
        return (minutes / 60).toFixed(2) + 'h';
      }

    function getExceptionName(dateStr) {
      if (!window.exceptions || !Array.isArray(window.exceptions)) return '';
      const exception = window.exceptions.find(e => dateStr >= e.from && dateStr <= e.to);
      return exception ? exception.name : '';
    }

    function hasOverride(dateStr) {
      const [year, week] = getWeekNumber(new Date(dateStr));
      return window.overrides.some(o => o.year === year && o.week === week);
    }

    function getOverrideCapacity(dateStr) {
      const [year, week] = getWeekNumber(new Date(dateStr));
      const override = window.overrides.find(o => o.year === year && o.week === week);
      const dayNames = ['Sonntag', 'Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag'];
      const d = new Date(dateStr);
      const dayName = dayNames[d.getDay()];
      const slot = override.slots.find(s => s.day === dayName);
      return slot ? Math.round(slot.hours * 60) : 0;
    }

    function getStandardCapacity(dateStr) {
      const dayNames = ['Sonntag', 'Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag'];
      const d = new Date(dateStr);
      const dayName = dayNames[d.getDay()];
      return window.slotMap[dayName] || 0;
    }

    function getCapacityForDay(dateStr) {
      if (isException(dateStr)) return 0;
      if (hasOverride(dateStr)) return getOverrideCapacity(dateStr);
      return getStandardCapacity(dateStr);
    }

    // --- LOGIK: ZEITPLANUNG ---
    function schedule(tasks, slots, exceptions) {
      if (!tasks.length) return [];
      const plan = [];
      const dayNames = ['Sonntag', 'Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag'];
      
      const sortedTasks = [...tasks].sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
      
      const slotMap = {};
      slots.forEach(s => { slotMap[s.day] = Math.round(s.hours * 60); });

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const maxDL = new Date(Math.max(...tasks.map(t => new Date(t.deadline))));

      const calendar = [];
      for (let d = new Date(today); d <= maxDL; d.setDate(d.getDate() + 1)) {
        const dStr = toLocalISO(d);
        const dName = dayNames[d.getDay()];
        const capacity = getCapacityForDay(dStr);

        if (capacity > 0) {
          calendar.push({ date: dStr, day: dName, remaining: capacity });
        }
      }

      sortedTasks.forEach(task => {
        let needed = task.minutes;
        for (let day of calendar) {
          if (needed <= 0) break;
          if (day.remaining <= 0) continue;
          if (new Date(day.date) >= new Date(task.deadline)) continue; 

          const alloc = Math.min(needed, day.remaining);
          plan.push({
            date: day.date,
            dayName: day.day,
            title: task.title,
            minutes: alloc,
            importance: task.importance,
            status: 'assigned'
          });
          day.remaining -= alloc;
          needed -= alloc;
        }
        if (needed > 0) {
          plan.push({ title: task.title, minutes: needed, status: 'overdue' });
        }
      });

      return plan.sort((a, b) => {
        if (a.date !== b.date) {
          return a.date > b.date ? 1 : -1;
        }
        return parseInt(b.importance) - parseInt(a.importance);
      });
    }

    // --- UI FUNKTIONEN ---
    function createRow(containerId, html) {
      const div = document.createElement('div');
      div.className = containerId.slice(0, -1) + '-row';
      div.innerHTML = html + `<button class="btn-del" onclick="this.parentElement.remove()">â</button>`;
      document.getElementById(containerId).appendChild(div);
    }
    function buildSlotMap(slots) {
      const map = {};
      slots.forEach(s => { map[s.day] = Math.round(s.hours * 60); });
      return map;
    }
    function getDayCapacity(dateStr) {
      return getCapacityForDay(dateStr);
    }
    function getHeatClass(utilization) {
      if (utilization > 1) return 'heat-overloaded';
      if (utilization >= 0.8) return 'heat-high';
      if (utilization >= 0.5) return 'heat-medium';
      return 'heat-low';
    }
    function setAsStandard(button) {
      const row = button.parentElement;
      const slots = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'].map(day => ({
        day: day,
        hours: parseFloat(row.querySelector(`.o-${day.toLowerCase()}`).value) || 0
      }));
      
      // Update standard slots
      document.getElementById('slots').innerHTML = '';
      slots.forEach(s => {
        const div = document.createElement('div');
        div.className = 'slot-row';
        const dayOptions = ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'].map(d => '<option ' + (d === s.day ? 'selected' : '') + '>' + d + '</option>').join('');
        div.innerHTML = '<select class="s-day">' + dayOptions + '</select> <input class="s-hrs" type="number" step="0.25" value="' + s.hours + '" style="width:55px"> Stunden/Tag <button class="btn-del" onclick="this.parentElement.remove()">â</button>';
        document.getElementById('slots').appendChild(div);
      });
      
      // Remove the override
      row.remove();
      alert('â Override als Standard gesetzt!');
      renderMonthView();
    }

    let currentMonthDate = new Date();
    currentMonthDate.setDate(1);

    function getTasksFromUI() {
      return [...document.querySelectorAll('.task-row')].map(r => ({
        title: r.querySelector('.t-title').value,
        minutes: parseFloat(r.querySelector('.t-hrs').value || 0) * 60,
        deadline: r.querySelector('.t-dl').value,
        importance: r.querySelector('.t-imp').value
      })).filter(t => t.title && t.deadline);
    }

    function getSlotsFromUI() {
      return [...document.querySelectorAll('.slot-row')].map(r => ({
        day: r.querySelector('.s-day').value,
        hours: parseFloat(r.querySelector('.s-hrs').value || 0)
      })).filter(s => s.hours > 0);
    }

    function getExceptionsFromUI() {
      return [...document.querySelectorAll('.exception-row')].map(r => ({
        name: r.querySelector('.e-name').value,
        from: r.querySelector('.e-from').value,
        to: r.querySelector('.e-to').value
      })).filter(e => e.from && e.to);
    }

    function renderMonthView() {
      const tasks = getTasksFromUI();
      const slots = getSlotsFromUI();
      const exceptions = getExceptionsFromUI();
      window.slotMap = buildSlotMap(slots);
      window.exceptions = exceptions;
      window.overrides = window.overrides || [];
      const results = schedule(tasks, slots, exceptions);
      // expose for drag/drop and legacy callers
      window.plan = results;
      window.tasks = tasks;

      const month = new Date(currentMonthDate);
      const daysInMonth = new Date(month.getFullYear(), month.getMonth() + 1, 0).getDate();
      const firstDayRaw = new Date(month.getFullYear(), month.getMonth(), 1).getDay();
      const firstDay = (firstDayRaw + 6) % 7;

      const dayPlans = {};
      results.forEach(r => {
        if (r.status === 'assigned') {
          if (!dayPlans[r.date]) dayPlans[r.date] = [];
          dayPlans[r.date].push(r);
        }
      });

      const deadlineTasks = {};
      tasks.forEach(task => {
        if (!deadlineTasks[task.deadline]) deadlineTasks[task.deadline] = [];
        deadlineTasks[task.deadline].push(task);
      });

      document.getElementById('month-title').textContent = month.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });

      const container = document.getElementById('month-calendar');
      container.innerHTML = '';
      const weekdays = ['Mo','Di','Mi','Do','Fr','Sa','So'];
      weekdays.forEach(day => {
        const cell = document.createElement('div');
        cell.className = 'weekday-label';
        cell.textContent = day;
        container.appendChild(cell);
      });

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'day empty';
        container.appendChild(empty);
      }

      const todayStr = toLocalISO(new Date());

      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = toLocalISO(new Date(month.getFullYear(), month.getMonth(), day));
        const dayCell = document.createElement('div');
        dayCell.className = 'day-cell';
        if (dateStr === todayStr) dayCell.classList.add('today');

        const capacity = getDayCapacity(dateStr);
        const tasksForDay = dayPlans[dateStr] || [];
        const deadlineForDay = deadlineTasks[dateStr] || [];
        const exceptionName = getExceptionName(dateStr);

        const header = document.createElement('div');
        header.className = 'day-number';
        header.textContent = day;
        dayCell.appendChild(header);

        if (exceptionName) {
          const exc = document.createElement('div');
          exc.className = 'exception-name';
          exc.textContent = exceptionName;
          dayCell.appendChild(exc);
        }

        if (capacity > 0) {
          const capacityInfo = document.createElement('div');
          capacityInfo.style.fontSize = '0.85rem';
          capacityInfo.style.margin = '0.25rem 0';
          capacityInfo.textContent = `${(capacity/60).toFixed(2)}h KapazitÃ¤t`;
          dayCell.appendChild(capacityInfo);
        }

        tasksForDay.slice(0, 2).forEach(task => {
          const taskBlock = document.createElement('div');
          taskBlock.className = 'task-block';
          taskBlock.textContent = `${task.title} ${(task.minutes/60).toFixed(1)}h`;
          dayCell.appendChild(taskBlock);
        });

        deadlineForDay.forEach(task => {
          const deadlineLabel = document.createElement('div');
          deadlineLabel.className = 'deadline-label';
          deadlineLabel.textContent = `Deadline: ${task.title}`;
          dayCell.appendChild(deadlineLabel);
        });

        if (tasksForDay.length > 2) {
          const more = document.createElement('div');
          more.style.fontSize = '0.75rem';
          more.style.marginTop = '4px';
          more.textContent = `+${tasksForDay.length-2} mehr`;
          dayCell.appendChild(more);
        }

        container.appendChild(dayCell);
      }
    }

    function changeMonth(offset) {
      currentMonthDate.setMonth(currentMonthDate.getMonth() + offset);
      renderMonthView();
    }

    document.getElementById('prev-month').onclick = () => changeMonth(-1);
    document.getElementById('next-month').onclick = () => changeMonth(1);
    window.addEventListener('keydown', (event) => {
      const active = document.activeElement;
      if (active && ['INPUT','TEXTAREA','SELECT'].includes(active.tagName)) return;
      if (event.key === 'ArrowLeft') changeMonth(-1);
      if (event.key === 'ArrowRight') changeMonth(1);
    });

    document.addEventListener('input', renderMonthView);
    document.addEventListener('change', renderMonthView);
    window.addEventListener('DOMContentLoaded', renderMonthView);

    // Task Row mit Step 0.25 und Default 0
    document.getElementById('add-task').onclick = () => createRow('tasks', `
      <input class="t-title" placeholder="Aufgabe" style="width:140px">
      <input class="t-hrs" type="number" step="0.25" value="0" style="width:55px"> Stunden
      |Deadline:
      <input class="t-dl" type="date">
      Prio <input class="t-imp" type="number" value="1" min="1" max="5" style="width:35px">
    `);

    // Slot Row mit Step 0.25 und Default 0
    document.getElementById('add-slot').onclick = () => createRow('slots', `
      <select class="s-day">
        ${['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'].map(d=>`<option>${d}</option>`).join('')}
      </select>
      <input class="s-hrs" type="number" step="0.25" value="0" style="width:55px"> Stunden/ Tag
    `);

    document.getElementById('add-exception').onclick = () => createRow('exceptions', `
      <input class="e-name" placeholder="Grund" style="width:100px">
    
                const overrideClass = hasOverride(dateStr) ? ' override' : '';
                const exceptionName = getExceptionName(dateStr);
                const deadlineTasks = tasks.filter(t => t.deadline === dateStr);
                html += `<div class="day-cell ${heatClass}${overrideClass}" data-date="${dateStr}" ondrop="drop(event)" ondragover="allowDrop(event)" title="Nutzung: ${Math.round(utilization * 100)}% | Verplant: ${formatHours(stat.used)} / ${formatHours(stat.capacity)}">`;
                html += `<div class="day-number">${day}</div>`;
                if (exceptionName) html += `<div class="exception-name">${exceptionName}</div>`;
                if (deadlineTasks.length) html += `<div class="deadline-flag">${deadlineTasks.map(t => 'ð ' + t.title).join(', ')}</div>`;
                
                const priorityColors = {
                  1: { bg: '#1e3a8a', text: '#ffffff' },
                  2: { bg: '#2563eb', text: '#ffffff' },
                  3: { bg: '#3b82f6', text: '#ffffff' },
                  4: { bg: '#93c5fd', text: '#1e3a8a' },
                  5: { bg: '#dbeafe', text: '#1e3a8a' }
                };
                
                dayTasks.forEach(task => {
                  const height = (task.minutes / 60) * 20;
                  const prio = parseInt(task.importance) || 1;
                  const colors = priorityColors[prio] || priorityColors[1];
                  const isDeadlineDay = (dateStr === task.deadline);
                  const deadlineFlag = isDeadlineDay ? '<span style="font-size:1.1em; margin-left:5px;" title="Deadline!">ð</span>' : '';
                  
                  html += `<div class="task-block" draggable="true" ondragstart="drag(event)" data-title="${task.title}" data-minutes="${task.minutes}" data-importance="${task.importance}" style="height:${height}px; background:${colors.bg}; color:${colors.text}; border-radius: 4px; padding: 2px 5px; font-size: 0.85em; margin-bottom: 2px; display: flex; align-items: center; justify-content: space-between;" title="${task.title} ${(task.minutes/60).toFixed(2)}h Prio ${prio}">
                    <span>${task.title}</span>
                    <span>${(task.minutes/60).toFixed(1)}h ${deadlineFlag}</span>
                  </div>`;
                });
                html += '</div>';
                day++;
              }
            }
            html += '</div>';
            if (day > daysInMonth) break;
          }
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
      
      // legacy results target removed; month view is the single UI
    }

    // Auto-Save triggern
    function enableAutoSave() {
      document.addEventListener('change', () => {
        localStorage.setItem('lernplan_autosave_tasks', JSON.stringify(
          [...document.querySelectorAll('.task-row')].map(r => ({
            title: r.querySelector('.t-title').value,
            hours: r.querySelector('.t-hrs').value,
            deadline: r.querySelector('.t-dl').value,
            importance: r.querySelector('.t-imp').value
          }))
        ));
        localStorage.setItem('lernplan_autosave_slots', JSON.stringify(
          [...document.querySelectorAll('.slot-row')].map(r => ({
            day: r.querySelector('.s-day').value,
            hours: r.querySelector('.s-hrs').value
          }))
        ));
        localStorage.setItem('lernplan_autosave_exceptions', JSON.stringify(
          [...document.querySelectorAll('.exception-row')].map(r => ({
            name: r.querySelector('.e-name').value,
            from: r.querySelector('.e-from').value,
            to: r.querySelector('.e-to').value
          }))
        ));
        localStorage.setItem('lernplan_autosave_overrides', JSON.stringify(
          [...document.querySelectorAll('.override-row')].map(r => ({
            year: parseInt(r.querySelector('.o-year').value),
            week: parseInt(r.querySelector('.o-week').value),
            slots: ['Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag','Sonntag'].map(day => ({
              day: day,
              hours: parseFloat(r.querySelector(`.o-${day.toLowerCase()}`).value) || 0
            }))
          }))
        ));
      });
    }
    enableAutoSave();


    // Drag & Drop
    function allowDrop(ev) {
      ev.preventDefault();
    }

    function drag(ev) {
      ev.dataTransfer.setData("text", ev.target.dataset.title);
    }

    function drop(ev) {
      ev.preventDefault();
      const title = ev.dataTransfer.getData("text");
      const targetDate = ev.target.closest('.day-cell').dataset.date;
      const dragged = document.querySelector(`[data-title="${title}"]`);
      if (dragged && targetDate) {
        const item = window.plan.find(p => p.title === title && p.status === 'assigned');
        if (item) {
          if (new Date(targetDate) > new Date(item.deadline)) {
            alert(`Die Aufgabe "${item.title}" darf nicht nach ihrer Deadline (${formatDateDE(item.deadline)}) verschoben werden.`);
            return;
          }
          // Move the element
          ev.target.closest('.day-cell').appendChild(dragged);
          // Update plan
          item.date = targetDate;
          // Re-render month view to update numbers
          renderMonthView();
        }
      }
    }

  </script>
</body>
</html>
